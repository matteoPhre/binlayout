name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # Fondamentale: permette a GitHub di generare il token OIDC
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on main
        run: |
          git fetch origin main --no-tags
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} is not on main. Release is allowed only for tags on main."
            exit 1
          fi
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org' # Serve per far capire a npm dove autenticarsi
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Run tests
        run: npm test
      
      # Usiamo il comando standard. Se il pacchetto è scoped (es. @matteophre/binlayout),
      # aggiungi --access public se non lo hai già definito nel package.json
      - name: Publish to npm
        run: npm publish --access public
        env:
          # NOTA CANCELLATA: NON passare NODE_AUTH_TOKEN.
          # Avendo messo id-token: write, npm capisce da solo di dover usare OIDC.
          NPM_CONFIG_PROVENANCE: true # Opzionale ma consigliato: genera la provenienza crittografica su npm
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2 # Aggiornato alla v2 stagna
        with:
          body: |
            Release for ${{ github.ref_name }}
            
            **Changes:**
            - Check the commit log for details
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}