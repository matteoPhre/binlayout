name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write 
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on main
        run: |
          git fetch origin main --no-tags
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} is not on main. Release is allowed only for tags on main."
            exit 1
          fi
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Run tests
        run: npm test
      - name: Publish to npm via Trusted Publisher
        uses: npm/action-publish@v3      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            Release for ${{ github.ref_name }}
            
            **Changes:**
            - Check the commit log for details
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}